# ──────────────────────────────────────────────
# RouteIQ — Router Configuration
# ──────────────────────────────────────────────

# --- Task → model chains (tried left-to-right) ---
task_chains:
  text:       [llama_groq, gpt4o_mini, gemini_flash, sonnet]
  code:       [qwen_coder, llama_groq, sonnet, opus]
  image:      [dall_e_3]
  audio:      [whisper]
  vision:     [sonnet, gpt4o_mini]
  think:      [opus, sonnet]
  strategy:   [opus]
  summarize:  [gemini_flash, gpt4o_mini, sonnet]

# --- Model definitions ---
models:
  gpt4o_mini:
    id: openai/gpt-4o-mini
    priority: 70
    free: false
    cost_per_1k_input: 0.00015
    cost_per_1k_output: 0.0006
    context_length: 128000
    capabilities: [text, vision, function]

  sonnet:
    id: anthropic/claude-sonnet-4-5
    priority: 85
    free: false
    cost_per_1k_input: 0.003
    cost_per_1k_output: 0.015
    context_length: 200000
    capabilities: [text, code, vision, think]

  opus:
    id: anthropic/claude-opus-4-6
    priority: 100
    free: false
    cost_per_1k_input: 0.015
    cost_per_1k_output: 0.075
    context_length: 200000
    capabilities: [text, code, vision, think, strategy]

  qwen_coder:
    id: qwen/qwen-2.5-coder-32b-instruct
    priority: 90
    free: true
    cost_per_1k_input: 0.0
    cost_per_1k_output: 0.0
    context_length: 32768
    capabilities: [code]

  gemini_flash:
    id: google/gemini-2.5-flash-lite
    priority: 65
    free: false
    cost_per_1k_input: 0.000075
    cost_per_1k_output: 0.0003
    context_length: 1048576
    capabilities: [text, vision, summarize]

  llama_groq:
    id: meta-llama/llama-3.3-70b-instruct
    priority: 55
    free: false
    cost_per_1k_input: 0.0001
    cost_per_1k_output: 0.00032
    context_length: 131072
    note: "via Groq — fastest inference, ~300 tok/s"
    capabilities: [text, code, summarize]

  dall_e_3:
    id: openai/dall-e-3
    priority: 100
    free: false
    cost_per_image: 0.04
    context_length: 4096
    capabilities: [image]

  whisper:
    id: openai/whisper-1
    priority: 100
    free: false
    cost_per_minute: 0.006
    context_length: 0
    capabilities: [audio]

  # Local models (Ollama) — free, private, offline
  llama_local:
    id: ollama/llama3.1:8b
    provider: ollama
    priority: 40
    free: true
    cost_per_1k_input: 0.0
    cost_per_1k_output: 0.0
    context_length: 131072
    capabilities: [text, code, summarize]
    note: "Requires Ollama running on localhost:11434"

# --- Model aliases (short names) ---
aliases:
  claude: sonnet
  gpt: gpt4o_mini
  gemini: gemini_flash
  local: llama_local

# --- Budget ---
budget:
  starting_balance_usd: 100.0
  warn_at_pct: 50
  critical_at_pct: 80
  stop_at_pct: 98
  daily_limit_usd: 10.0       # NEW: per-day spend limit (0 = no limit)
  monthly_limit_usd: 200.0    # NEW: per-month spend limit (0 = no limit)

# --- Alerts ---
alerts:
  channel: telegram   # telegram | webhook | email | slack | none

# --- Routing policy ---
policy:
  circuit_breaker_errors: 5
  circuit_breaker_window_s: 60
  retry_on_429: true
  retry_429_max: 3
  retry_429_backoff_s: 1.0

# --- Scoring weights ---
weights:
  cost_weight: 0.5
  quality_weight: 0.3
  latency_weight: 0.2

# --- Cache ---
cache:
  enabled: true
  max_size: 256         # max cached responses
  ttl_seconds: 3600     # 1 hour

# --- Server ---
server:
  host: "0.0.0.0"
  port: 8000
